<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/web-app-manifest-192x192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- iOS PWA Splash Screen & App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ReGISS" />
    <link rel="apple-touch-startup-image" href="/apple-touch-icon.png" />
    
    <title>Alumni ReGISS</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- 
      Script de limpeza de Service Worker — Executado ANTES do React.
      Detecta SW travados com cache antigo (causa do "só funciona em incógnito")
      e força a atualização automática sem que o usuário precise fazer nada.
    -->
    <script>
      (function() {
        if ('serviceWorker' in navigator) {
          // Se houver um SW aguardando atualização, ativa imediatamente
          navigator.serviceWorker.getRegistration().then(function(reg) {
            if (!reg) return;
            if (reg.waiting) {
              reg.waiting.postMessage({ type: 'SKIP_WAITING' });
            }
            reg.addEventListener('updatefound', function() {
              var newWorker = reg.installing;
              if (!newWorker) return;
              newWorker.addEventListener('statechange', function() {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // Novo SW instalado — recarrega silenciosamente para limpar cache antigo
                  window.location.reload();
                }
              });
            });
          }).catch(function() {});

          // Detecta se os chunks do React falharam a carregar (SW servindo arquivo velho)
          // e limpa todos os caches para garantir versão fresca
          window.__SW_CACHE_BUST__ = function() {
            caches.keys().then(function(names) {
              names.forEach(function(name) { caches.delete(name); });
            });
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              regs.forEach(function(r) { r.unregister(); });
              window.location.reload();
            });
          };
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
